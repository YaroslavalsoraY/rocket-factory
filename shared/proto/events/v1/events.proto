syntax = "proto3";

package events.v1;

option go_package = "github.com/YaroslavalsoraY/rocket-factory/shared/pkg/proto/events/v1;events_v1";

// Событие - оплата заказа
message OrderPaid {
    // Уникальный идентификатор события (для идемпотентности)
    string event_uuid = 1;

    // Идентификатор оплаченного заказа
    string order_uuid = 2;

    // Идентификатор пользователя
    string user_uuid = 3;

    // Способ оплаты (строкой, значение из `PaymentMethod`)
    string payment_method = 4;

    // Идентификатор транзакции, сгенерированный в результате оплаты
    string transaction_uuid = 5;
}

// Событие - корабль собран
message ShipAssembled {
    // Уникальный идентификатор события (для идемпотентности)
    string event_uuid = 1;

    // Идентификатор собранного заказа
    string order_uuid = 2;

    // Идентификатор пользователя
    string user_uuid = 3;

    // Время (в секундах), потраченное на сборку корабля
    int64 build_time_sec = 4;
}